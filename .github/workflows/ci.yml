name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm test
      - name: Fix commits require tests
        if: github.event_name == 'pull_request'
        run: |
          MSG=$(git log -1 --pretty=%s HEAD)
          if echo "$MSG" | grep -q "^fix:"; then
            if ! git diff --name-only HEAD~1 | grep -q "\.test\."; then
              echo "fix: commit requires at least one test file in diff"
              exit 1
            fi
          fi
      - name: Notify on failure
        if: failure()
        run: |
          curl -d "CI failed: ${GITHUB_SHA::7}" \
            -H "Title: Oxveil CI" -H "Priority: high" \
            ntfy.sh/oxveil-ci-${{ github.repository_owner }}
